<mat-toolbar color="primary" class="navbar">
  <div class="nav-container">
    <button mat-button routerLink="/" class="logo-button">
      <mat-icon>fitness_center</mat-icon>
      <span class="logo-text">FitnessBook</span>
    </button>

    <span class="spacer"></span>

    <div class="desktop-menu">
      <button mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon>home</mat-icon>
        Home
      </button>

      <button mat-button routerLink="/groups" routerLinkActive="active">
        <mat-icon>groups</mat-icon>
        Classes
      </button>

      @if (currentUser) {
        <button mat-button routerLink="/bookings" routerLinkActive="active">
          <mat-icon>event</mat-icon>
          My Bookings
        </button>

        @if (isAdmin()) {
          <button mat-button routerLink="/admin" routerLinkActive="active" class="admin-button">
            <mat-icon>admin_panel_settings</mat-icon>
            Admin
          </button>
        }

        <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
          <mat-icon>account_circle</mat-icon>
          {{ currentUser.firstName }}
          <mat-icon>arrow_drop_down</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu">
          <button mat-menu-item disabled>
            <mat-icon>person</mat-icon>
            <span>{{ currentUser.email }}</span>
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      } @else {
        <button mat-button routerLink="/login">
          <mat-icon>login</mat-icon>
          Login
        </button>
        <button mat-raised-button color="accent" routerLink="/register">
          Sign Up
        </button>
      }
    </div>

    <button mat-icon-button class="mobile-menu-button" [matMenuTriggerFor]="mobileMenu">
      <mat-icon>menu</mat-icon>
    </button>

    <mat-menu #mobileMenu="matMenu">
      <button mat-menu-item routerLink="/">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </button>
      <button mat-menu-item routerLink="/groups">
        <mat-icon>groups</mat-icon>
        <span>Classes</span>
      </button>

      @if (currentUser) {
        <button mat-menu-item routerLink="/bookings">
          <mat-icon>event</mat-icon>
          <span>My Bookings</span>
        </button>

        @if (isAdmin()) {
          <button mat-menu-item routerLink="/admin">
            <mat-icon>admin_panel_settings</mat-icon>
            <span>Admin</span>
          </button>
        }

        <mat-divider></mat-divider>

        <button mat-menu-item disabled>
          <mat-icon>person</mat-icon>
          <span>{{ currentUser.firstName }}</span>
        </button>

        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      } @else {
        <mat-divider></mat-divider>
        <button mat-menu-item routerLink="/login">
          <mat-icon>login</mat-icon>
          <span>Login</span>
        </button>
        <button mat-menu-item routerLink="/register">
          <mat-icon>person_add</mat-icon>
          <span>Sign Up</span>
        </button>
      }
    </mat-menu>
  </div>
</mat-toolbar>
